<!DOCTYPE html>
<html>
<head>
    <title>Tic Tac Toe</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial;

            background: linear-gradient(135deg, #000000, #0a1f44);
            color: #00bfff;
        }

        .container {
            text-align: center;
            background: rgba(0, 0, 0, 0.7);
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 0 20px #00bfff;
        }

        h1 {
            margin-bottom: 10px;
            color: #00bfff;
        }

        #status {
            margin-bottom: 15px;
            color: #66d9ff;
        }

        .board {
            display: grid;
            grid-template-columns: repeat(3, 100px);
            gap: 10px;
            justify-content: center;
        }

        .cell {
            width: 100px;
            height: 100px;
            font-size: 32px;
            border: 2px solid #00bfff;
            border-radius: 10px;
            cursor: pointer;

            background: #000;
            color: #00bfff;

            transition: 0.3s;
        }

        .cell:hover {
            background: #001f3f;
            transform: scale(1.05);
            box-shadow: 0 0 10px #00bfff;
        }

        button {
            margin-top: 15px;
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;

            background: #007bff;
            color: #fff;
            font-size: 16px;
        }

        button:hover {
            background: #0056b3;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🎮 Tic Tac Toe</h1>
    <h2 id="status">Player X's turn</h2>

    <div class="board" id="board"></div>
    <button onclick="resetGame()">Reset</button>
</div>

<script>
let currentPlayer = "X"
let board = ["","","","","","","","",""]

const boardDiv = document.getElementById("board")
const status = document.getElementById("status")

for(let i=0;i<9;i++){
    let btn = document.createElement("button")
    btn.className = "cell"
    btn.onclick = () => makeMove(i, btn)
    boardDiv.appendChild(btn)
}

function makeMove(i, btn){
    if(board[i] !== "") return

    board[i] = currentPlayer
    btn.innerText = currentPlayer

    if(checkWinner()){
        status.innerText = currentPlayer + " Wins!"
        return
    }

    if(board.every(cell => cell !== "")){
        status.innerText = "Draw!"
        return
    }

    currentPlayer = currentPlayer === "X" ? "O" : "X"
    status.innerText = "Player " + currentPlayer + "'s turn"
}

function checkWinner(){
    const wins = [
        [0,1,2],[3,4,5],[6,7,8],
        [0,3,6],[1,4,7],[2,5,8],
        [0,4,8],[2,4,6]
    ]

    return wins.some(([a,b,c]) =>
        board[a] && board[a] === board[b] && board[a] === board[c]
    )
}

function resetGame(){
    board = ["","","","","","","","",""]
    currentPlayer = "X"
    status.innerText = "Player X's turn"

    const cells = document.getElementsByClassName("cell")
    for(let cell of cells){
        cell.innerText = ""
    }
}
</script>

</body>
